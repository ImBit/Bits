name: Release and Publish

permissions:
    contents: write

on:
    workflow_dispatch:

jobs:
    build:
        name: Build Release
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'
                    cache: gradle

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Determine version
                id: determine-version
                run: |
                    VERSION=$(grep -E "^bits_version=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
                    if [ -z "$VERSION" ]; then
                      echo "❌ Could not read version from gradle.properties"
                      exit 1
                    fi
                    echo "VERSION=$VERSION" >> $GITHUB_ENV
                    echo "Detected version: $VERSION"

            -   name: Build with Gradle
                run: ./gradlew build

            -   name: Update README
                run: |
                    VERSION="${{ env.VERSION }}"
                    sed -i "s/\(Bits:[A-Za-z]\+:\)[0-9.]\+/\1$VERSION/g" README.md
                    sed -i "s/<version>[0-9.]\+<\/version>/<version>$VERSION<\/version>/g" README.md

            -   name: Commit README changes
                run: |
                    git config --local user.email "github-actions[bot]@users.noreply.github.com"
                    git config --local user.name "github-actions[bot]"
                    git add README.md
                    git diff --staged --quiet || git commit -m "📝 Update README to version ${{ env.VERSION }}"
                    git push

            -   name: Generate Changelog
                id: changelog
                run: |
                    export LC_ALL=C.UTF-8
                    export LANG=C.UTF-8
                    
                    git fetch --tags --force

                    CURRENT_TAG="${{ env.VERSION }}"
                    PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -vx "$CURRENT_TAG" | head -n1)

                    if [ -z "$PREVIOUS_TAG" ]; then
                      echo "## 🚀 Initial Release $CURRENT_TAG" > changelog.md
                      echo "" >> changelog.md
                      echo "This is the first official release." >> changelog.md
                    else
                      echo "## 🚀 Release $CURRENT_TAG" > changelog.md
                      echo "" >> changelog.md

                      git log --pretty=format:"%s (%h)" "$PREVIOUS_TAG"..HEAD > all_commits.txt

                      FEATURES=$(grep -E "^(✨|:sparkles:)" all_commits.txt || true)
                      if [ ! -z "$FEATURES" ]; then
                        echo "### ✨ Features" >> changelog.md
                        echo "$FEATURES" | sed -E 's/^(✨|:sparkles:) /\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      BUGFIXES=$(grep -E "^(🐛|:bug:|🚑️|:ambulance:)" all_commits.txt || true)
                      if [ ! -z "$BUGFIXES" ]; then
                        echo "### 🐛 Bug Fixes" >> changelog.md
                        echo "$BUGFIXES" | sed -E 's/^(🐛|:bug:) /\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      REFACTOR=$(grep -E "^(🎨|:art:|♻️|:recycle:)" all_commits.txt || true)
                      if [ ! -z "$REFACTOR" ]; then
                        echo "### 🎨 Refinement" >> changelog.md
                        echo "$REFACTOR" | sed -E 's/^(🎨|:art:) /\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      OTHER=$(grep -vE "^(✨|:sparkles:|🐛|:bug:|🚑️|:ambulance:|🎨|:art:|♻️|:recycle:|Merge)" all_commits.txt || true)
                      if [ ! -z "$OTHER" ]; then
                        echo "### 📦 Other Changes" >> changelog.md
                        echo "$OTHER" | sed 's/^/\* /' >> changelog.md
                        echo "" >> changelog.md
                      fi

                      rm -f all_commits.txt
                    fi

                    cat changelog.md

                    CHANGELOG=$(cat changelog.md)
                    echo "changelog<<EOF" >> $GITHUB_OUTPUT
                    echo "$CHANGELOG" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT

            -   name: Create Release
                id: create_release
                uses: softprops/action-gh-release@v1
                with:
                    tag_name: ${{ env.VERSION }}
                    name: Release ${{ env.VERSION }}
                    body: ${{ steps.changelog.outputs.changelog }}
                    draft: false
                    prerelease: false
                    files: |
                        API/build/libs/*-${{ env.VERSION }}.jar
                        API/build/libs/*-${{ env.VERSION }}-javadoc.jar
                        Paper/build/libs/*-${{ env.VERSION }}.jar
                        Paper/build/libs/*-${{ env.VERSION }}-javadoc.jar
                        Velocity/build/libs/*-${{ env.VERSION }}.jar
                        Velocity/build/libs/*-${{ env.VERSION }}-javadoc.jar
                        LICENSE
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            -   name: Bump minor version
                run: |
                    CURRENT="${{ env.VERSION }}"
                    MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
                    MID=$(echo "$CURRENT" | cut -d'.' -f2)
                    MINOR=$(echo "$CURRENT" | cut -d'.' -f3)

                    NEW_MINOR=$((MINOR + 1))
                    NEW_VERSION="$MAJOR.$MID.$NEW_MINOR"

                    sed -i "s/^bits_version=.*/bits_version=$NEW_VERSION/" gradle.properties

                    echo "Bumped version: $CURRENT → $NEW_VERSION"
                    echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

            -   name: Commit version bump
                run: |
                    git config user.name  "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add gradle.properties
                    git commit -m "🏷️ Bump version to ${{ env.NEW_VERSION }}"
                    git push
